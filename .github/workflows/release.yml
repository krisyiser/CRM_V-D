name: Release Tauri App

on:
  push:
    tags:
      - 'v*' # Dispara el workflow al crear etiquetas como v0.1.0, v1.0.0, etc.

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # Puedes agregar macos-latest y ubuntu-latest si lo deseas en el futuro

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Windows)
        run: |
          # No se necesitan dependencias adicionales usualmente en Windows-latest

      - name: Clean signing key
        shell: pwsh
        run: |
          $key = @"
          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          "@
          $cleanKey = $key.Trim() -replace '\s',''
          "TAURI_SIGNING_PRIVATE_KEY=$cleanKey" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend and compile Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Vainilla & Descanso v__VERSION__'
          releaseBody: 'Notas de la versión de Vainilla & Descanso.'
          releaseDraft: false
          prerelease: false

      - name: Extract signature and update update.json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # Extract signature and update update.json
          $sigPath = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*-setup.exe.sig" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($sigPath -and (Test-Path $sigPath)) {
            $signature = Get-Content -Path $sigPath -Raw
            $signature = $signature.Trim()
            Write-Host "Found signature: $signature"
            
            $exeFile = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*-setup.exe" -Recurse | Select-Object -First 1 -ExpandProperty Name
            $exeFileClean = $exeFile.Replace(" & ", ".")
            Write-Host "Exe file name: $exeFileClean"
            
            $updateJsonPath = "update.json"
            $updateJson = Get-Content -Path $updateJsonPath | ConvertFrom-Json
            $updateJson.version = $tag.Replace("v", "")
            $updateJson.platforms."windows-x86_64".signature = $signature
            $updateJson.platforms."windows-x86_64".url = "https://github.com/${{ github.repository }}/releases/download/$tag/$exeFileClean"
            
            # Write back to update.json
            $updateJson | ConvertTo-Json -Depth 10 | Out-File -FilePath $updateJsonPath -Encoding utf8
            
            # Commit and push updated update.json back to main
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add update.json
            git commit -m "chore: update signature for $tag [skip ci]"
            git push origin HEAD:main
          } else {
            Write-Error "Signature file (*-setup.exe.sig) not found!"
          }
